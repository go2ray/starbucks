<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta property="og:type" content="Website" />
    <meta property="og:site_name" content="Startbucks" />
    <meta property="og:title" content="Starbucks Coffee Korea" />
    <meta property="og:description" content="스타벅스는 세계에서 가장 큰 다국적 커피 전문점으로 64개국에서 총 23,187개의 매점을 운영하고 있습니다." />
    <meta property="og:image" content="/images/Starbucks_seo.jpg" />
    <meta property="og:url" content="https://starbucks.co.kr" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starbucks Coffee Korea</title>
    <!-- Favicon -->
    <link rel="icon" href="/favicon.png"/>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <!-- Google Material Icon -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css"/>
    <link rel="stylesheet" href="/css/signin.css"/>
    <!-- Lodash -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js" referrerpolicy="no-referrer"></script>
    <!-- Swiper.js -->
    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <!-- defer : html이 준비되면 -->
    <script defer src="/js/common.js"></script>
</head>
<body>
    <!-- Header -->
    <div id="header-include"></div>
    <!-- Section : Sign in -->
    <section class="signin">
        <h1>로그인</h1>
        <div class="signin__card">
            <h2>
                <strong>Welcome!</strong> 스타벅스에 오신 것을 환영합니다.
            </h2>
            <form>
                <input type="text" placeholder="아이디를 입력해주세요."/>
                <input type="password" placeholder="비밀번호를 입력해주세요."/>
                <button>로그인</button>
                <p>
                    * 비밀번호를 타 사이트와 같이 사용할 경우 도용 위험이 있으니,<br/>
                    정기적으로 비밀번호를 변경하세요.
                </p>
            </form>
            <div class="actions">
                <a href="javascript:void(0)">회원가입</a>
                <a href="javascript:void(0)">아이디 찾기</a>
                <a href="javascript:void(0)">비밀번호 찾기</a>
            </div>
        </div>
    </section>
    <!-- Footer -->
    <div id="footer-include"></div>
</body>
</html>
