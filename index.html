<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta property="og:type" content="Website" />
    <meta property="og:site_name" content="Startbucks" />
    <meta property="og:title" content="Starbucks Coffee Korea" />
    <meta property="og:description" content="스타벅스는 세계에서 가장 큰 다국적 커피 전문점으로 64개국에서 총 23,187개의 매점을 운영하고 있습니다." />
    <meta property="og:image" content="/images/Starbucks_seo.jpg" />
    <meta property="og:url" content="https://starbucks.co.kr" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starbucks Coffee Korea</title>
    <!-- Favicon -->
    <link rel="icon" href="/favicon.png"/>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <!-- Google Material Icon -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css"/>
    <link rel="stylesheet" href="/css/main.css"/>
    <!-- Lodash -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js" referrerpolicy="no-referrer"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- GSAP & scroll to Plugin -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollToPlugin.min.js" integrity="sha512-kz526itdNcpyMs18TLPOhsnIeOIO1JywWKbbF77zR+ZKpZ4gwubXhwaURHpt5Se9AAqSK2j8ID0LnfXsB2Jkjg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Swiper.js -->
    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <!-- Scroll Magic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ScrollMagic/2.0.8/ScrollMagic.min.js" integrity="sha512-8E3KZoPoZCD+1dgfqhPbejQBnQfBXe8FuwL4z/c8sTrgeDMFEnoyTlH3obB4/fV+6Sg0a0XF+L/6xS4Xx1fUEg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- defer : html이 준비되면 -->
    <script defer src="/js/youtube.js"></script>
    <script defer src="/js/common.js"></script>
    <script defer src="/js/main.js"></script>
</head>
<body>
    <!-- Header -->
    <div id="header-include"></div>
    <!-- Visual -->
    <section class="visual">
        <div class="inner">
            <div class="title fade-in">
                <img src="/images/visual_title.png" alt="STARBUCKS DELIGHFUL START TO THE YEARS"/>
                <a href="javascript:void(0)" class="btn btn--brown">자세히 보기</a>
            </div>
            <div class="fade-in">
                <img src="/images/visual_cup1.png" alt="New Oatmeal Latte" class="cup1 image"/>
            <img src="/images/visual_cup1_text.png" alt="오트밀 라떼" class="cup1 text"/>
            </div>
            <div class="fade-in">
                <img src="/images/visual_cup2.png" alt="New Starbucks Caramel Crumble Mocha" class="cup2 image"/>
            <img src="/images/visual_cup2_text.png" alt="스타벅스 카라멜 크럼블 모카" class="cup2 text"/>
            </div>
            <div class="fade-in">
                <img src="/images/visual_spoon.png" alt="Spoon" class="spoon"/>
            </div>
        </div>
    </section>
    <!-- Notice, Promotion -->
    <section class="notice">
        <div class="notice-line">
            <div class="bg-left"></div>
            <div class="bg-right"></div>
            <div class="inner">
                <div class="inner__left">
                    <!-- Notice -->
                    <h2>공지사항</h2>
                    <!-- Swiper -->
                    <div class="swiper">
                        <!-- Additional required wrapper -->
                        <div class="swiper-wrapper">
                            <!-- Slides -->
                            <div class="swiper-slide">
                                <a href="javascript:void(0)">크리스마스 & 연말연시 스타벅스 매장 영업시간</a>
                            </div>
                            <div class="swiper-slide">
                                <a href="javascript:void(0)">[당첨자 발표] 뉴이어 전자영수증 이벤트</a>
                            </div>
                            <div class="swiper-slide">
                                <a href="javascript:void(0)">스타벅스 애플리케이션 버전 업데이트</a>
                            </div>
                            <div class="swiper-slide">
                                <a href="javascript:void(0)">[당첨자 발표] 2021 스타벅스 플래너 영수증 이벤트</a>
                            </div>
                        </div>
                    </div>
                    <a href="javascript:void(0)" class="notice-line__more">
                        <div class="material-icons">add_circle</div>
                    </a>
                </div>
                <div class="inner__right">
                    <!-- Promotion -->
                    <h2>스타벅스 프로모션</h2>
                    <div class="toggle-promotion">
                        <div class="material-icons">arrow_circle_up</div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Promotion : Banner Swiper -->
        <div class="promotion">
            <!-- Slider main container -->
            <div class="swiper">
                <!-- Additional required wrapper -->
            <div class="swiper-wrapper">
                <!-- Slides -->
                <div class="swiper-slide">
                    <img src="/images/promotion_slide1.jpg" alt="2021 뉴이어, 스타벅스와 함께 즐겁고 활기차게 시작하세요!"/>
                    <a href="javascript:void(0)" class="btn">자세히 보기</a>
                </div>
                <div class="swiper-slide">
                    <img src="/images/promotion_slide2.jpg" alt="기간 내 스타벅스 카드 e-gift를 3만원 이상 선물시, 아메리카노 e-쿠폰을 드립니다."/>
                    <a href="javascript:void(0)" class="btn">자세히 보기</a>
                </div>
                <div class="swiper-slide">
                    <img src="/images/promotion_slide3.jpg" alt="뉴이어 푸드와 제조 음료를 세트로 구매시, 뉴이어 음료 1+1쿠폰을 드립니다."/>
                    <a href="javascript:void(0)" class="btn">자세히 보기</a>
                </div>
                <div class="swiper-slide">
                    <img src="/images/promotion_slide4.jpg" alt="신년 MD상품 포함 3만원 이상 구매고객께 아메리카노 쿠폰 드립니다."/>
                    <a href="javascript:void(0)" class="btn">자세히 보기</a>
                </div>
                <div class="swiper-slide">
                    <img src="/images/promotion_slide5.jpg" alt="2017 디지털 럭키 드로우 100% 당첨의 행운을 드립니다!"/>
                    <a href="javascript:void(0)" class="btn">자세히 보기</a>
                </div>
            </div>
            <!-- If we need pagination -->
            <div class="swiper-pagination"></div>
            <!-- If we need navigation buttons -->
            <div class="swiper-button-prev">
                <div class="material-icons">arrow_back</div>
            </div>
            <div class="swiper-button-next">
                <div class="material-icons">arrow_forward</div>
            </div>
        </div>
    </section>
    <!-- Rewards -->
    <section class="rewards">
        <div class="bg-left"></div>
        <div class="bg-right"></div>
        <div class="inner">
            <div class="btn-group">
                <div class="btn btn--reverse sign-up">회원가입</div>
                <div class="btn sign-in">로그인</div>
                <div class="btn gift">e-Gift 선물하기</div>
            </div>
        </div>
    </section>
    <!-- Youtobe Video -->
    <section class="youtube">
        <div class="youtube__area">
            <!-- 영상 출력 요소 생성 -->
            <div id="player"></div>
        </div>
        <div class="youtube__cover"></div>
        <div class="inner">
            <img src="/images/floating1.png" alt="Icon" class="floating floating1"/>
            <img src="/images/floating2.png" alt="Icon" class="floating floating2"/>
        </div>
    </section>
    <!-- Season Product -->
    <section class="season-product scroll-spy">
        <div class="inner">
            <img src="/images/floating3.png" alt="Icon" class="floating floating3"/>
            <img src="/images/season_product_image.png" alt="Iced Coffee Blend" class="product back-to-position to-right delay-0"/>
            <div class="text-group">
                <img src="/images/season_product_text1.png" alt="상쾌하게 여름을 반겨줄 시즌 원두 아이스커피 블렌드" class="title back-to-position to-left delay-1"/>
                <img src="/images/season_product_text2.png" alt="아프리카와 라틴 아메리카 커피의 블렌드로 시트러스함과 은은한 캐러멜 향을 동시에 느낄 수 있으며, 차갑게 즐길 때 풍미가 더욱 깊어지는 원두입니다." class="description back-to-position to-left delay-2"/>
                <div class="more back-to-position to-left delay-3">
                    <a href="javascript:void(0)" class="btn">자세히 보기</a>
                </div>
            </div>
        </div>
    </section>
    <!-- Reserve Coffee -->
    <section class="reserve-coffee scroll-spy">
        <div class="inner">
            <img src="/images/reserve_logo.png" alt="스타벅스 리저브 로고" class="reserve-logo back-to-position to-right delay-0"/>
            <div class="text-group">
                <img src="/images/reserve_text.png" alt="스타벅스 리저브는 진귀하고 이국적이며 우리가 지금껏 만나보지 못한 특별한 프리미엄 커피를 여러분에게 소개해드리는 프로그램입니다." class="description back-to-position to-right delay-1"/>
                <div class="more back-to-position to-right delay-2">
                    <a href="javascript:void(0)" class="btn btn--gold">자세히 보기</a>
                </div>
            </div>
            <img src="/images/reserve_image.png" alt="Coffee Products" class="reserve-image back-to-position to-left delay-3"/>
        </div>
    </section>
    <!-- Pick Your Favorite -->
    <section class="pick-your-favorite scroll-spy">
        <div class="inner">
            <div class="text-group">
                <img src="/images/favorite_text1.png" alt="Pick Your Favorite" class="title back-to-position to-right delay-0"/>
                <img src="/images/favorite_text2.png" alt="다양한 메뉴를 스타벅스에서 즐겨보세요." class="description back-to-position to-right delay-1"/>
                <div class="more back-to-position to-right delay-2">
                    <a href="javascript:void(0)" class="btn btn--white">자세히 보기</a>
                </div>
            </div>
        </div>
    </section>
    <!-- Reserve Store -->
    <section class="reserve-store">
        <div class="inner">
            <div class="medal">
                <div class="front">
                    <img src="/images/reserve_store_medal_front.png" alt="front"/>
                </div>
                <div class="back">
                    <img src="/images/reserve_store_medal_back.png" alt="back"/>
                    <a href="javascript:void(0)"><div class="btn">매장안내</div></a>
                </div>
            </div>
        </div>
    </section>
    <!-- Find The Store -->
    <section class="find-store scroll-spy">
        <div class="inner">
            <img src="/images/find_store_texture1.png" alt="" class="texture1"/>
            <img src="/images/find_store_texture2.png" alt="" class="texture2"/>
            <img src="/images/find_store_picture1.jpg" alt="" class="picture picture1 back-to-position to-right delay-0"/>
            <img src="/images/find_store_picture2.jpg" alt="" class="picture picture2 back-to-position to-right delay-0"/>
            <div class="text-group">
                <img src="/images/find_store_text1.png" alt="스타벅스를 가까이에서 경험해보세요" class="title back-to-position to-left delay-1"/>
                <img src="/images/find_store_text2.png" alt="리저브매장, 드라이브 스루 매장, 커뮤내티 매장" class="description back-to-position to-left delay-2"/>
                <div class="more back-to-position to-left delay-3">
                    <a href="javascript:void(0)" class="btn">자세히 보기</a>
                </div>
            </div>
        </div>
    </section>
    <!-- Footer -->
    <div id="footer-include"></div>
</body>
</html>
